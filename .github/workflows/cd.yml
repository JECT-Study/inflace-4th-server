name: CD - Docker Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}
  DB_URL: ${{ secrets.DB_URL }}
  DB_USERNAME: ${{ secrets.DB_USERNAME }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
  DATA_API_KEY: ${{ secrets.DATA_API_KEY }}
  DATA_API_URL: ${{ secrets.DATA_API_URL }}
  ANALYTICS_API_URL: ${{ secrets.ANALYTICS_API_URL }}
  JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment (dev or prod)
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "ENVIRONMENT=prod" >> "$GITHUB_ENV"
          else
            echo "ENVIRONMENT=dev" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and push image with Jib
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: ./gradlew clean jib -x test --stacktrace --info

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,ENVIRONMENT,DB_URL,DB_USERNAME,DB_PASSWORD,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,DATA_API_KEY,DATA_API_URL,ANALYTICS_API_URL,JWT_EXPIRATION,JWT_SECRET
          script: |
            docker pull youcastle/inflace:$IMAGE_TAG
            docker stop inflace || true
            docker rm inflace || true
            docker run -d --name inflace -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=$ENVIRONMENT \
              -e DB_URL=$DB_URL \
              -e DB_USERNAME=$DB_USERNAME \
              -e DB_PASSWORD=$DB_PASSWORD \
              -e GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
              -e GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET \
              -e GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI \
              -e DATA_API_KEY=$DATA_API_KEY \
              -e DATA_API_URL=$DATA_API_URL \
              -e ANALYTICS_API_URL=$ANALYTICS_API_URL \
              -e JWT_EXPIRATION=$JWT_EXPIRATION \
              -e JWT_SECRET=$JWT_SECRET \
              youcastle/inflace:$IMAGE_TAG
